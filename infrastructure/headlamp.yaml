---
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    # ClusterIP only. Headlamp is effectively a cluster-admin console, so it is
    # never exposed via Traefik or the Cloudflare Tunnel. Reachable only through
    # `tailscale serve` on the host, i.e. from the tailnet.
    service:
      type: ClusterIP
      port: 80
    # No baked-in token. Log in with a ServiceAccount token you mint yourself.
    config:
      pluginsDir: /build/plugins
    initContainers:
      - name: headlamp-plugins
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:latest
        imagePullPolicy: Always
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
        volumeMounts:
          - mountPath: /build/plugins
            name: headlamp-plugins
    persistentVolumeClaim:
      enabled: false
    volumeMounts:
      - mountPath: /build/plugins
        name: headlamp-plugins
    volumes:
      - name: headlamp-plugins
        emptyDir: {}
