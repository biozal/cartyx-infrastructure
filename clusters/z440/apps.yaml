apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Namespaces and ClusterIssuers must exist first, or the Certificates in
  # apps/*/certificate.yaml fail with "issuer not found" on the first reconcile.
  dependsOn:
    - name: infrastructure
