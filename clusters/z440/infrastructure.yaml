apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Do not report Ready until cloudflared is actually serving. Without this,
  # `apps` would start reconciling against a cluster whose namespaces exist but
  # whose tunnel is still coming up.
  wait: true
  timeout: 5m
