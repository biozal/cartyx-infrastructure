---
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    # ClusterIP only. Headlamp is effectively a cluster-admin console, so it is
    # never exposed via Traefik or the Cloudflare Tunnel. Reachable only through
    # `tailscale serve` on the host, i.e. from the tailnet.
    service:
      type: ClusterIP
      port: 80
    # No baked-in token. Log in with a ServiceAccount token you mint yourself.
    config:
      pluginsDir: /build/plugins
    initContainers:
      - name: headlamp-plugins
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:latest
        imagePullPolicy: Always
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
        volumeMounts:
          - mountPath: /build/plugins
            name: headlamp-plugins
    persistentVolumeClaim:
      enabled: false
    volumeMounts:
      - mountPath: /build/plugins
        name: headlamp-plugins
    volumes:
      - name: headlamp-plugins
        emptyDir: {}
---
# Login identity for the Headlamp UI. No token is stored anywhere: mint a
# short-lived one on demand with
#     kubectl create token headlamp-admin -n headlamp --duration=8h
# and paste it into the UI. Tokens are not committed and expire on their own.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: headlamp
---
# cluster-admin, because Headlamp is a full cluster console. It is reachable
# only from the tailnet (`tailscale serve` on 8443), never from the LAN or the
# Cloudflare Tunnel. If you want a read-only view instead, bind `view` here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: headlamp
