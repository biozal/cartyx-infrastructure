---
# Where Flux reads desired state from. The repo is public, so no secretRef is
# needed -- nothing in this cluster holds a Git credential.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/biozal/cartyx-infrastructure.git
  ref:
    branch: main
---
# Root Kustomization. Applies everything in this directory, which in turn
# declares the `infrastructure` and `apps` Kustomizations. Flux manages itself
# from here: edit clusters/z440/ in Git and the change reconciles.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/z440
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
