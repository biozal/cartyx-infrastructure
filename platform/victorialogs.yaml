apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: victoriametrics
  namespace: platform
spec:
  interval: 1h
  url: https://victoriametrics.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victorialogs
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-logs-single
      version: '0.13.8'
      sourceRef: { kind: HelmRepository, name: victoriametrics }
  values:
    server:
      # fullnameOverride includes the "-server" suffix so the rendered Service
      # name is victorialogs-server (required by later tasks), not victorialogs.
      fullnameOverride: victorialogs-server
      retentionPeriod: 90d
      persistentVolume:
        enabled: true
        size: 20Gi
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { memory: 384Mi }
